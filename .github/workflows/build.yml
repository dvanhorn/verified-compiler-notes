name: Build and Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false

      - name: Build project
        run: |
          lake exe verified-compiler-notes

      - name: Generate TeX sources
        run: |
          lake exe verified-compiler-notes-pdf

      - name: Build PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: _out/tex
          compiler: latexmk
          latexmk_use_lualatex: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-compiler-notes-pdf
          path: _out/tex/main.pdf

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _out/html-multi

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
